<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Shirt Order Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Webpage Background */
        body {
            background-color: #f3f4f6;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- PDF Document Background & Styles --- */
        #pdf-content {
            background-color: #ffffff;
            /* Lassana light gradient grid background ekak */
            background-image: 
                linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px),
                linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
        }
        
        /* Top Premium Gradient Line */
        #pdf-content::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 8px;
            background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
            z-index: 10;
        }

        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            transform: translateX(150%);
            transition: transform 0.3s ease-in-out;
            z-index: 50;
        }
        #toast.show { transform: translateX(0); }
    </style>
</head>
<body class="min-h-screen text-gray-800 p-4 md:p-8">

    <div id="toast" class="bg-gray-900 text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-3">
        <i class="fa-solid fa-circle-check text-green-400"></i>
        <span id="toast-msg">Success!</span>
    </div>

    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-10 fade-in">
            <h1 class="text-3xl md:text-5xl font-extrabold text-gray-900 tracking-tight">Order <span class="text-indigo-600">Generator</span></h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-5 bg-white/90 backdrop-blur-md p-6 rounded-2xl shadow-xl fade-in border border-gray-200">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2 border-b pb-2"><i class="fa-solid fa-pen-to-square text-indigo-500"></i> Details</h2>
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Date</label>
                        <input type="date" id="input-date" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none transition" onchange="updatePreview()">
                    </div>

                    <div class="bg-gray-50 p-4 rounded-lg border border-gray-100">
                        <label class="block text-sm font-semibold mb-1">Page Logo</label>
                        <input type="file" id="input-logo" accept="image/*" class="w-full text-sm mb-3" onchange="previewImage(this, 'preview-logo')">
                        <label class="block text-xs text-gray-500 mb-1">Adjust Logo Size</label>
                        <input type="range" id="logo-size" min="50" max="250" value="120" class="w-full accent-indigo-600" oninput="updateLogoSize()">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1">T-Shirt Design Photo</label>
                        <input type="file" id="input-design" accept="image/*" class="w-full text-sm border border-gray-300 rounded-lg p-2" onchange="previewImage(this, 'preview-design')">
                    </div>

                    <div class="bg-indigo-50/50 p-4 rounded-lg border border-indigo-100">
                        <label class="block text-sm font-semibold mb-3"><i class="fa-solid fa-chart-bar text-indigo-500"></i> Sizes & Quantities</label>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                            <div><label class="text-xs font-bold text-gray-600">Small (S)</label><input type="number" min="0" class="qty-input w-full border border-gray-300 rounded-lg px-3 py-1 text-center" placeholder="0" oninput="updateChart()"></div>
                            <div><label class="text-xs font-bold text-gray-600">Medium (M)</label><input type="number" min="0" class="qty-input w-full border border-gray-300 rounded-lg px-3 py-1 text-center" placeholder="0" oninput="updateChart()"></div>
                            <div><label class="text-xs font-bold text-gray-600">Large (L)</label><input type="number" min="0" class="qty-input w-full border border-gray-300 rounded-lg px-3 py-1 text-center" placeholder="0" oninput="updateChart()"></div>
                            <div><label class="text-xs font-bold text-gray-600">X-Large (XL)</label><input type="number" min="0" class="qty-input w-full border border-gray-300 rounded-lg px-3 py-1 text-center" placeholder="0" oninput="updateChart()"></div>
                            <div><label class="text-xs font-bold text-gray-600">2X-Large (XXL)</label><input type="number" min="0" class="qty-input w-full border border-gray-300 rounded-lg px-3 py-1 text-center" placeholder="0" oninput="updateChart()"></div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1">Note</label>
                        <textarea id="input-note" rows="3" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="Instructions here..." oninput="updatePreview()"></textarea>
                    </div>

                    <button onclick="generatePDF()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-lg hover:shadow-xl transition-all flex justify-center items-center gap-2 transform hover:-translate-y-1">
                        <i class="fa-solid fa-file-pdf"></i> Download PDF
                    </button>
                </div>
            </div>

            <div class="lg:col-span-7 fade-in">
                <div class="sticky top-8">
                    <div class="flex justify-between items-center mb-3 px-2">
                        <h2 class="text-lg font-bold text-gray-700"><i class="fa-solid fa-eye"></i> Live Preview</h2>
                    </div>
                    
                    <div class="overflow-x-auto rounded-lg">
                        <div id="pdf-content" class="p-8 md:p-12 w-full min-h-[600px]">
                            
                            <div class="flex justify-between items-center border-b-2 border-indigo-100 pb-6 mb-6 pt-4">
                                <div>
                                    <img id="preview-logo" src="" alt="Logo" class="hidden object-contain" style="width: 120px;">
                                    <div id="logo-placeholder" class="text-gray-400 italic text-sm">No Logo Uploaded</div>
                                </div>
                                <div class="text-right">
                                    <h1 class="text-3xl font-black text-gray-800 uppercase tracking-widest drop-shadow-sm">Order Sheet</h1>
                                    <p class="text-gray-600 mt-1 font-semibold">Date: <span id="display-date" class="text-gray-900">YYYY-MM-DD</span></p>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                
                                <div class="bg-white/90 backdrop-blur-sm rounded-xl p-4 border border-gray-200 flex flex-col items-center justify-center min-h-[250px] shadow-sm">
                                    <h3 class="text-sm font-bold text-indigo-400 uppercase tracking-wide mb-3 w-full text-center">Design Preview</h3>
                                    <img id="preview-design" src="" class="hidden max-h-64 rounded shadow-sm object-contain">
                                    <div id="design-placeholder" class="text-gray-300 text-center">
                                        <i class="fa-solid fa-shirt text-4xl mb-2"></i>
                                        <p class="text-sm">No design uploaded</p>
                                    </div>
                                </div>

                                <div>
                                    <h3 class="text-sm font-bold text-gray-800 uppercase tracking-wide mb-3">Sizing & Quantities</h3>
                                    <div class="overflow-hidden rounded-lg border border-gray-200 bg-white/90 shadow-sm">
                                        <table class="w-full text-left text-sm">
                                            <thead class="bg-gray-800 text-white">
                                                <tr>
                                                    <th class="px-4 py-3 font-semibold">Size</th>
                                                    <th class="px-4 py-3 font-semibold text-right">Qty</th>
                                                </tr>
                                            </thead>
                                            <tbody class="divide-y divide-gray-100" id="chart-body">
                                                <tr><td class="px-4 py-3 text-gray-500 italic" colspan="2">Waiting for input...</td></tr>
                                            </tbody>
                                            <tfoot class="bg-indigo-50 font-bold border-t-2 border-indigo-200">
                                                <tr>
                                                    <td class="px-4 py-3 text-indigo-900">TOTAL</td>
                                                    <td class="px-4 py-3 text-right text-indigo-900 text-lg" id="display-total">0</td>
                                                </tr>
                                            </tfoot>
                                        </table>
                                    </div>
                                </div>

                            </div>

                            <div class="mt-8 pt-6 border-t border-indigo-100">
                                <h3 class="text-sm font-bold text-gray-800 uppercase tracking-wide mb-2"><i class="fa-solid fa-circle-info text-indigo-500"></i> Notes</h3>
                                <div class="bg-white/90 p-4 rounded-lg border border-gray-200 min-h-[80px] shadow-sm">
                                    <p id="display-note" class="text-gray-700 whitespace-pre-wrap text-sm italic">No special instructions provided.</p>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('input-date').valueAsDate = new Date();
        updatePreview();

        function previewImage(input, targetId) {
            const file = input.files[0];
            const imgElement = document.getElementById(targetId);
            const placeholderId = targetId === 'preview-logo' ? 'logo-placeholder' : 'design-placeholder';
            const placeholderElement = document.getElementById(placeholderId);

            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imgElement.src = e.target.result;
                    imgElement.classList.remove('hidden');
                    placeholderElement.classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        function updateLogoSize() {
            const size = document.getElementById('logo-size').value;
            document.getElementById('preview-logo').style.width = size + 'px';
        }

        function updateChart() {
            const inputs = document.querySelectorAll('.qty-input');
            const sizes = ['S', 'M', 'L', 'XL', 'XXL'];
            const tbody = document.getElementById('chart-body');
            
            let html = '';
            let total = 0;
            let hasData = false;

            inputs.forEach((input, index) => {
                const val = parseInt(input.value);
                if (val > 0) {
                    hasData = true;
                    total += val;
                    html += `
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="px-4 py-2 font-medium text-gray-800">${sizes[index]}</td>
                            <td class="px-4 py-2 text-right font-bold text-gray-700">${val}</td>
                        </tr>
                    `;
                }
            });

            if (hasData) {
                tbody.innerHTML = html;
            } else {
                tbody.innerHTML = '<tr><td class="px-4 py-2 text-gray-400 italic" colspan="2">No quantities entered yet.</td></tr>';
            }

            document.getElementById('display-total').innerText = total;
        }

        function updatePreview() {
            const dateVal = document.getElementById('input-date').value;
            document.getElementById('display-date').innerText = dateVal || 'Not Set';

            const noteVal = document.getElementById('input-note').value;
            const displayNote = document.getElementById('display-note');
            if (noteVal.trim() === '') {
                displayNote.innerText = "No special instructions provided.";
                displayNote.classList.add('text-gray-400');
                displayNote.classList.remove('text-gray-800');
            } else {
                displayNote.innerText = noteVal;
                displayNote.classList.remove('text-gray-400');
                displayNote.classList.add('text-gray-800');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function generatePDF() {
            showToast("Generating PDF... Please wait.");
            const element = document.getElementById('pdf-content');
            
            // Mobile eke awula hadanna element eka temporary desktop size ekata force karanawa
            const originalWidth = element.style.width;
            const originalMaxWidth = element.style.maxWidth;
            const originalPosition = element.style.position;
            const originalTransform = element.style.transform;
            
            element.style.width = '800px';
            element.style.maxWidth = '800px';
            element.style.position = 'absolute'; // Container eken eliyata aragannawa print weddi
            element.style.top = '0';
            element.style.left = '0';
            element.style.transform = 'none';

            // Document eke uda hatama scroll karanawa (Naththam yata kedenawa)
            window.scrollTo(0, 0);

            // Podi delay ekak denawa browser ekata aluth width eka hadaganna
            setTimeout(() => {
                const finalHeight = element.scrollHeight; // Force kalata passe height eka gannawa

                const opt = {
                    margin:       0, // Wate sudu kali ainkarala
                    filename:     `Order_${document.getElementById('input-date').value}.pdf`,
                    image:        { type: 'jpeg', quality: 1 },
                    html2canvas:  { 
                        scale: 2, 
                        useCORS: true,
                        scrollY: 0, // Scroll wela thibbath kedenne nathi wenna
                        windowWidth: 800,
                        width: 800,
                        height: finalHeight
                    },
                    jsPDF:        { 
                        unit: 'px', 
                        format: [800, finalHeight], // Kelinma doc eke size ekata PDF eka set karanawa
                        orientation: 'portrait' 
                    }
                };

                html2pdf().set(opt).from(element).save().then(() => {
                    // Download wunata passe ayeth mobile view eke display eka hadanawa
                    element.style.width = originalWidth || '100%';
                    element.style.maxWidth = originalMaxWidth || '100%';
                    element.style.position = originalPosition || 'relative';
                    element.style.top = '';
                    element.style.left = '';
                    element.style.transform = originalTransform || '';
                    
                    setTimeout(() => showToast("PDF downloaded successfully!"), 500);
                });
            }, 300); // 300ms delay eken DOM eka ready karagannawa
        }
    </script>
</body>
</html>
